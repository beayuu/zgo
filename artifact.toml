kind = "web"
previewPath = "/"
title = "ZamGo"
version = "1.0.0"
id = "artifacts/zamgo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24400

[services.development]
run = "pnpm --filter @workspace/zamgo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zamgo", "run", "build" ]
publicDir = "artifacts/zamgo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24400"
BASE_PATH = "/"
